version: '3.8'

services:
  daisy-assistant:
    build: .
    container_name: daisy_hub
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /var/log:/var/log:ro  # Mounts host logs as Read-Only so Daisy can parse auth.log safely
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    network_mode: "host"     # Allows Daisy to use the host network interface cards for network scanning
    restart: unless-stopped
